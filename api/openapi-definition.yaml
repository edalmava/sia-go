              $ref: '#/components/schemas/Usuario'
            examples:
              valido:
                value:
                  nombre_usuario: "maria_gomez"
                  clave: "Passw0rd!"
                  id_rol: 2
              invalido:
                value:
                  nombre_usuario: "mg"
                  clave: "1234"
                  id_rol: 2
                description: |
                  Errores esperados:
                  - nombre_usuario: mínimo 5 caracteres
                  - clave: no cumple política de complejidad
