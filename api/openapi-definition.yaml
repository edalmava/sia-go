# ========= AUTENTICACIÓN =========
  /auth/login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión y obtener token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre_usuario:
                  type: string
                password:
                  type: string
              required:
                - nombre_usuario
                - password
      responses:
        '200':
          description: Token JWT generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  token_type:
                    type: string
                    example: bearer
        '401':
          description: Credenciales inválidas
        '400':
          description: Solicitud incorrecta

  /auth/refresh:
    post:
      tags: [Autenticación]
      summary: Renovar token de acceso usando un refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
                - refresh_token
      responses:
        '200':
          description: Nuevo token generado
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  token_type:
                    type: string
                    example: bearer
        '401':
          description: Token de refresco inválido o expirado

  /auth/logout:
    post:
      tags: [Autenticación]
      summary: Cerrar sesión y revocar token
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Sesión cerrada correctamente
        '401':
          description: Token inválido o ausente
  
