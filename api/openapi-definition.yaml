openapi: 3.0.3
info:
  title: API Instituciones Educativas Colombia
  version: 1.0.0
  description: API para gestión de instituciones educativas públicas en Colombia

servers:
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/edalmava-030/sia/1.0.0

tags:
  - name: Instituciones
    description: Operaciones con instituciones educativas
  - name: Sedes
    description: Gestión de sedes por institución
  - name: Grados
    description: Gestión de grados académicos
  - name: Grupos
    description: Gestión de grupos por grado
  - name: Jornadas
    description: Gestión de jornadas escolares
  - name: Asignaturas
    description: Gestión de asignaturas académicas
  - name: Estudiantes
    description: Administración de estudiantes
  - name: Docentes
    description: Gestión de docentes
  - name: Carga Académica
    description: Gestión de cargas académicas para docentes
  - name: Matricula
    description: Gestión de matrículas de estudiantes
  - name: Evaluaciones
    description: Operaciones relacionadas con evaluaciones académicas
  - name: Calificaciones
    description: Gestión de calificaciones de estudiantes
  - name: Asistencia
    description: Control de asistencia de estudiantes
  - name: Observaciones
    description: Registro de observaciones de comportamiento
  - name: Usuarios
    description: Gestión de usuarios del sistema
  - name: Periodos
    description: Gestión de periodos académicos
  - name: Año Lectivo
    description: Gestión de años lectivos
  - name: Acudientes
    description: Gestión de acudientes de estudiantes
  - name: Competencias
    description: Gestión de competencias académicas
  - name: Logros
    description: Gestión de logros académicos
  - name: Horarios
    description: Gestión de horarios escolares

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtenido del endpoint de autenticación.
        Ejemplo: Bearer <token>
      
  parameters:
    apiVersionHeader:
      name: X-API-Version
      in: header
      required: false
      schema:
        type: string
        default: "1.0"
      description: Versión de la API solicitada

    offsetParam:
      name: offset
      in: query
      description: Número de registros a omitir para paginación
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    
    limitParam:
      name: limit
      in: query
      description: Número máximo de registros a devolver
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    sortParam: # Nuevo parámetro reutilizable
      name: sort
      in: query
      description: >
        Campo(s) por los cuales ordenar los resultados.
        Separar múltiples campos por comas.
        Prefijar con '-' para orden descendente (ej: "nombre,-fecha_creacion").
        Los campos disponibles dependen del recurso solicitado.
      required: false
      schema:
        type: string
      example: "nombre,-fecha_registro"
        
  schemas:    
    Institucion:
      type: object
      properties:
        id_institucion:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          minLength: 5
          maxLength: 100
          pattern: "^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$"
          example: "Institución Educativa Distrital Kennedy"
        codigo_dane:
          type: string
          pattern: "^[0-9]{12}$"
          example: "111001107836"
      required:
        - nombre
        - codigo_dane    

    Sede:
      type: object
      properties:
        id_sede:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Sede Principal"
        direccion:
          type: string
          maxLength: 150
          example: "Calle 5 #10-25, Kennedy"
        id_institucion:
          type: integer
          example: 1
        id_municipio:
          type: integer
          example: 1
      required:
        - nombre
        - id_institucion

    Grado:
      type: object
      properties:
        id_grado:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 20
          example: "Sexto"
      required:
        - nombre

    Grupo:
      type: object
      properties:
        id_grupo:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 10
          example: "6A"
        id_grado:
          type: integer
          example: 1
        id_sede:
          type: integer
          example: 1
        id_jornada:
          type: integer
          example: 1
      required:
        - nombre
        - id_grado
        - id_sede
        - id_jornada

    Jornada:
      type: object
      properties:
        id_jornada:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 50
          example: "Mañana"
      required:
        - nombre

    Asignatura:
      type: object
      properties:
        id_asignatura:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Matemáticas"
        intensidad_horaria:
          type: integer
          example: 5
      required:
        - nombre
        
    GradoAsignatura:
      type: object
      properties:
        id_grado:
          type: integer
          example: 1
        id_asignatura:
          type: integer
          example: 1
      required:
        - id_grado
        - id_asignatura

    Estudiante:
      type: object
      properties:
        documento_identidad:
          type: string
          pattern: "^[0-9]{8,10}$"
          example: "1023456789"
        tipo_documento:
          type: string
          enum: ["CC", "TI", "RC", "CE", "PA"]
          example: "TI"
        fecha_nacimiento:
          type: string
          format: date
          description: "Debe ser una fecha pasada"
          example: "2010-05-15"
        telefono:
          type: string
          pattern: "^\\+?[0-9]{7,15}$"
          example: "+573101234567"
        correo_electronico:
          type: string
          format: email
          maxLength: 100
          example: "juan.perez@ejemplo.com"    
        id_estudiante:
          type: integer
          readOnly: true
          example: 1
        nombres:
          type: string
          maxLength: 100
          example: "Juan Carlos"
        apellidos:
          type: string
          maxLength: 100
          example: "Pérez Rodríguez"        
        direccion:
          type: string
          maxLength: 150
          example: "Calle 10 #15-30"
        id_municipio:
          type: integer
          example: 1
      required:
        - nombres
        - apellidos
        - documento_identidad
        - tipo_documento
        
    Docente:
      type: object
      properties:
        id_docente:
          type: integer
          readOnly: true
          example: 1
        nombres:
          type: string
          maxLength: 100
          example: "María José"
        apellidos:
          type: string
          maxLength: 100
          example: "Gómez Sánchez"
        documento_identidad:
          type: string
          maxLength: 20
          example: "52123456"
        tipo_documento:
          type: string
          enum: ["CC", "TI", "CE", "PA"]
          example: "CC"
        profesion:
          type: string
          maxLength: 100
          example: "Licenciado en Matemáticas"
        telefono:
          type: string
          maxLength: 20
          example: "3157891234"
        correo_electronico:
          type: string
          maxLength: 100
          example: "maria.gomez@ejemplo.com"
      required:
        - nombres
        - apellidos
        - documento_identidad
        - tipo_documento
    
    CargaAcademica:
      type: object
      properties:
        id_carga:
          type: integer
          readOnly: true
          example: 1
        id_docente:
          type: integer
          example: 1
        id_grupo:
          type: integer
          example: 1
        id_asignatura:
          type: integer
          example: 1
        id_anio_lectivo:
          type: integer
          example: 1
      required:
        - id_docente
        - id_grupo
        - id_asignatura
        - id_anio_lectivo
    
    Periodo:
      type: object
      properties:
        id_periodo:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 50
          example: "Primer Periodo"
        fecha_inicio:
          type: string
          format: date
          example: "2025-01-15"
        fecha_fin:
          type: string
          format: date
          example: "2025-04-15"
        id_anio_lectivo:
          type: integer
          example: 1
      required:
        - nombre
        - fecha_inicio
        - fecha_fin
        - id_anio_lectivo
        
    AnioLectivo:
      type: object
      properties:
        id_anio_lectivo:
          type: integer
          readOnly: true
          example: 1
        anio:
          type: integer
          example: 2025
        fecha_inicio:
          type: string
          format: date
          example: "2025-01-15"
        fecha_fin:
          type: string
          format: date
          example: "2025-11-30"
        estado:
          type: string
          enum: ["ACTIVO", "CERRADO", "PLANEACION"]
          example: "ACTIVO"
      required:
        - anio
        - fecha_inicio
        - fecha_fin
        
    TipoEvaluacion:
      type: object
      properties:
        id_tipo_evaluacion:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 50
          example: "Examen Final"
        descripcion:
          type: string
          maxLength: 255
          example: "Evaluación del periodo correspondiente al 40% de la nota final"
      required:
        - nombre

    Evaluacion:
      type: object
      properties:
        id_evaluacion:
          type: integer
          readOnly: true
          example: 1
        id_carga_academica:
          type: integer
          example: 1
        id_periodo:
          type: integer
          example: 1
        id_tipo_evaluacion:
          type: integer
          example: 1
        id_logro:
          type: integer
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Evaluación parcial de ecuaciones"
        descripcion:
          type: string
          example: "Evaluación sobre resolución de ecuaciones de primer grado"
        fecha_presentacion:
          type: string
          format: date
          example: "2025-03-15"
      required:
        - id_carga_academica
        - id_periodo
        - id_tipo_evaluacion
        - nombre

    Pregunta:
      type: object
      properties:
        id_pregunta:
          type: integer
          readOnly: true
          example: 1
        id_evaluacion:
          type: integer
          example: 1
        enunciado:
          type: string
          maxLength: 500
          example: "Resolver la ecuación: 2x + 5 = 15"
        tipo:
          type: string
          enum: ["ABIERTA", "OPCION_MULTIPLE", "VERDADERO_FALSO"]
          example: "ABIERTA"
        peso:
          type: number
          format: float
          minimum: 0.01
          maximum: 5.0
          default: 1.0
          example: 1.0
      required:
        - id_evaluacion
        - enunciado
        - tipo

    OpcionRespuesta:
      type: object
      properties:
        id_opcion:
          type: integer
          readOnly: true
          example: 1
        id_pregunta:
          type: integer
          example: 1
        texto:
          type: string
          maxLength: 300
          example: "x = 5"
        es_correcta:
          type: boolean
          example: true
      required:
        - id_pregunta
        - texto

    Calificacion:
      type: object
      properties:
        id_calificacion:
          type: integer
          readOnly: true
          example: 1
        id_evaluacion:
          type: integer
          example: 1
        id_matricula:
          type: integer
          example: 1
        nota:
          type: number
          format: float
          minimum: 0.0
          maximum: 5.0
          example: 4.5
        observaciones:
          type: string
          maxLength: 255
          example: "Buen desempeño en resolución de problemas"
        fecha_calificacion:
          type: string
          format: date-time
          example: "2025-03-16T10:30:00Z"
      required:
        - id_evaluacion
        - id_matricula
        - nota

    RespuestaEstudiante:
      type: object
      properties:
        id_respuesta:
          type: integer
          readOnly: true
          example: 1
        id_pregunta:
          type: integer
          example: 1
        id_calificacion:
          type: integer
          example: 1
        respuesta:
          type: string
          maxLength: 1000
          example: "x = 5 porque despejando la x: 2x = 10, entonces x = 5"
        puntaje_obtenido:
          type: number
          format: float
          example: 1.0
        id_opcion_seleccionada:
          type: integer
          example: 2
      required:
        - id_pregunta
        - id_calificacion

    Matricula:
      type: object
      properties:
        id_matricula:
          type: integer
          readOnly: true
          example: 1
        id_estudiante:
          type: integer
          example: 1
        id_grupo:
          type: integer
          example: 1
        id_anio_lectivo:
          type: integer
          example: 1
        fecha_matricula:
          type: string
          format: date
          example: "2025-01-10"
        estado:
          type: string
          enum: ["ACTIVO", "DESERTOR", "PROMOVIDO", "RETIRADO", "GRADUADO"]
          example: "ACTIVO"
      required:
        - id_estudiante
        - id_grupo
        - id_anio_lectivo

    Asistencia:
      type: object
      properties:
        id_asistencia:
          type: integer
          readOnly: true
          example: 1
        id_matricula:
          type: integer
          example: 1
        fecha:
          type: string
          format: date
          example: "2025-03-15"
        estado:
          type: string
          enum: ["PRESENTE", "AUSENTE", "TARDE", "JUSTIFICADO"]
          example: "PRESENTE"
        observaciones:
          type: string
          maxLength: 255
          example: "Llegó 10 minutos tarde por transporte"
        fecha_registro:
          type: string
          format: date-time
          example: "2025-03-15T08:15:00Z"
      required:
        - id_matricula
        - fecha
        - estado

    ObservacionComportamiento:
      type: object
      properties:
        id_observacion:
          type: integer
          readOnly: true
          example: 1
        id_matricula:
          type: integer
          example: 1
        id_docente_observador:
          type: integer
          example: 1
        id_carga_academica:
          type: integer
          example: 1
        fecha_hora:
          type: string
          format: date-time
          example: "2025-03-15T09:30:00Z"
        descripcion:
          type: string
          example: "El estudiante mostró un comportamiento disruptivo durante la clase"
        tipo_observacion:
          type: string
          maxLength: 50
          example: "DISCIPLINARIO"
        acciones_tomadas:
          type: string
          maxLength: 500
          example: "Se estableció diálogo con el estudiante y se acordaron compromisos"
      required:
        - id_matricula
        - id_docente_observador
        - descripcion

    Acudiente:
      type: object
      properties:
        id_acudiente:
          type: integer
          readOnly: true
          example: 1
        nombres:
          type: string
          maxLength: 100
          example: "Pedro"
        apellidos:
          type: string
          maxLength: 100
          example: "Pérez Gómez"
        documento_identidad:
          type: string
          maxLength: 20
          example: "79123456"
        tipo_documento:
          type: string
          enum: ["CC", "CE", "PA"]
          example: "CC"
        telefono:
          type: string
          maxLength: 20
          example: "3157891234"
        direccion:
          type: string
          maxLength: 150
          example: "Calle 10 #15-30"
        correo_electronico:
          type: string
          maxLength: 100
          example: "pedro.perez@ejemplo.com"
      required:
        - nombres
        - apellidos
        - documento_identidad
        - tipo_documento
        - telefono

    EstudianteAcudiente:
      type: object
      properties:
        id_estudiante:
          type: integer
          example: 1
        id_acudiente:
          type: integer
          example: 1
        parentesco:
          type: string
          maxLength: 50
          example: "Padre"
        es_principal:
          type: boolean
          example: true
      required:
        - id_estudiante
        - id_acudiente

    Competencia:
      type: object
      properties:
        id_competencia:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 200
          example: "Razonamiento matemático"
        descripcion:
          type: string
          example: "Capacidad para analizar y resolver problemas usando herramientas matemáticas"
        id_asignatura:
          type: integer
          example: 1
        id_grado:
          type: integer
          example: 1
      required:
        - nombre
        - id_asignatura
        - id_grado

    Logro:
      type: object
      properties:
        id_logro:
          type: integer
          readOnly: true
          example: 1
        descripcion:
          type: string
          example: "Resuelve problemas que involucran ecuaciones de primer grado"
        id_competencia:
          type: integer
          example: 1
        id_periodo:
          type: integer
          example: 1
        porcentaje:
          type: number
          format: float
          minimum: 0
          maximum: 100
          example: 25.0
      required:
        - descripcion
        - id_competencia
        - id_periodo

    ActividadRecuperacion:
      type: object
      properties:
        id_recuperacion:
          type: integer
          readOnly: true
          example: 1
        id_calificacion:
          type: integer
          example: 1
        fecha:
          type: string
          format: date
          example: "2025-04-10"
        descripcion:
          type: string
          example: "Taller de refuerzo sobre ecuaciones"
        nota_recuperacion:
          type: number
          format: float
          minimum: 0.0
          maximum: 5.0
          example: 3.5
        fecha_calificacion:
          type: string
          format: date-time
          example: "2025-04-10T11:30:00Z"
      required:
        - id_calificacion
        - fecha
        - descripcion

    Usuario:
      type: object
      properties:
        id_usuario:
          type: integer
          readOnly: true
          example: 1
        nombre_usuario:
          type: string
          minLength: 5
          maxLength: 50
          pattern: "^[a-zA-Z0-9_]+$"
          example: "jperez"
        clave:
          type: string
          format: password
          writeOnly: true
          minLength: 8
          maxLength: 64
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,}$"
          example: "ContraseñaSegura123!"
        id_docente:
          type: integer
          nullable: true
          example: null
        id_estudiante:
          type: integer
          nullable: true
          example: 1
        activo:
          type: boolean
          example: true
        id_rol:
          type: integer
          example: 3
      required:
        - nombre_usuario
        - clave
        
    Rol:
      type: object
      properties:
        id_rol:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 50
          example: "ADMIN"
        descripcion:
          type: string
          maxLength: 255
          example: "Administrador del sistema con acceso completo"
        es_rol_sistema:
          type: boolean
          example: true
      required:
        - nombre

    Modulo:
      type: object
      properties:
        id_modulo:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 50
          example: "Académico"
        descripcion:
          type: string
          maxLength: 255
          example: "Gestión de evaluaciones y calificaciones"
        codigo:
          type: string
          maxLength: 30
          example: "ACAD"
      required:
        - nombre
        - codigo

    Permiso:
      type: object
      properties:
        id_permiso:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Ver notas"
        descripcion:
          type: string
          maxLength: 255
          example: "Visualizar calificaciones"
        codigo:
          type: string
          maxLength: 30
          example: "ACAD_VIEW_NOTES"
        id_modulo:
          type: integer
          example: 2
      required:
        - nombre
        - codigo
        - id_modulo

    RolPermiso:
      type: object
      properties:
        id_rol:
          type: integer
          example: 1
        id_permiso:
          type: integer
          example: 1
      required:
        - id_rol
        - id_permiso

    Departamento:
      type: object
      properties:
        id_departamento:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Cundinamarca"
        codigo:
          type: string
          maxLength: 5
          example: "25"
      required:
        - nombre
        - codigo

    Municipio:
      type: object
      properties:
        id_municipio:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 100
          example: "Bogotá D.C."
        codigo:
          type: string
          maxLength: 5
          example: "001"
        id_departamento:
          type: integer
          example: 1
      required:
        - nombre
        - codigo
        - id_departamento

    DiaSemana:
      type: object
      properties:
        id_dia:
          type: integer
          readOnly: true
          example: 1
        nombre:
          type: string
          maxLength: 20
          example: "Lunes"
        codigo:
          type: integer
          minimum: 1
          maximum: 7
          example: 1
      required:
        - nombre
        - codigo

    Horario:
      type: object
      properties:
        id_horario:
          type: integer
          readOnly: true
          example: 1
        id_carga_academica:
          type: integer
          example: 1
        id_dia:
          type: integer
          minimum: 1
          maximum: 7
          example: 1
        hora_inicio:
          type: string
          format: time
          example: "07:00:00"
        hora_fin:
          type: string
          format: time
          example: "07:55:00"
      required:
        - id_carga_academica
        - id_dia
        - hora_inicio
        - hora_fin

    ArchivoDigital:
      type: object
      properties:
        id_archivo:
          type: integer
          readOnly: true
          example: 1
        tipo_archivo:
          type: string
          maxLength: 50
          example: "FOTO_ESTUDIANTE"
        nombre_archivo:
          type: string
          maxLength: 255
          example: "foto_juan_perez.jpg"
        ruta_almacenamiento:
          type: string
          maxLength: 500
          example: "/archivos/estudiantes/fotos/foto_juan_perez.jpg"
        mime_type:
          type: string
          maxLength: 100
          example: "image/jpeg"
        fecha_carga:
          type: string
          format: date-time
          example: "2025-01-10T15:30:00Z"
        id_usuario_carga:
          type: integer
          example: 1
        entidad_relacionada:
          type: string
          maxLength: 50
          example: "ESTUDIANTE"
        id_entidad:
          type: integer
          example: 1
      required:
        - tipo_archivo
        - nombre_archivo
        - ruta_almacenamiento
        - mime_type
        - entidad_relacionada
        - id_entidad

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum: ["validation_error", "auth_error", "not_found", "conflict"]
          example: "validation_error"
        message:
          type: string
          example: "Error de validación en los datos de entrada"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "documento_identidad"
              message:
                type: string
                example: "Debe contener entre 8 y 10 dígitos"
              code:
                type: string
                example: "invalid_format"

